<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

.zoom {
    width: 100%;
    height: 100%;
}

.zoom video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    animation: zoomIn 9s linear forwards;
}

@keyframes zoomIn {
    from {
        transform: scale(1);
    }
    to {
        transform: scale(1.5);
    }
}
</style>
</head>

<body>

<div class="zoom">
    <video id="introVideo" autoplay playsinline>
        <source src="tabernacle1.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<script>
const video = document.getElementById("introVideo");

// Go to the next page when the video ends
video.addEventListener("ended", () => {
    window.location.href = "prayer.html";
});

// Fallback in case the video doesn't fire the ended event
setTimeout(() => {
    window.location.href = "prayer.html";
}, 12000);
</script>

</body>
</html>
