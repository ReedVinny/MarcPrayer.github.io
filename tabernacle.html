<!DOCTYPE html>
<html>
<head>
<style>
html, body {
    margin: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
}

.zoom {
    width: 100%;
    height: 100%;
    background-image: url("tabernacle3.png");
    background-size: cover;
    background-position: center;
    animation: zoomIn 30s forwards;
}

@keyframes zoomIn {
    from {
        transform: scale(1);
    }
    to {
        transform: scale(3);
    }
}
</style>
</head>

<body>
<div class="zoom"></div>

<script>
setTimeout(() => {
    window.location.href = "prayer.html";
}, 9000);
</script>
</body>
</html>
